<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - Campus Events</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-calendar-alt"></i> CampusEvents</h2>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html" class="active">Events</a></li>
                <li><a href="dashboard.html" id="dashboardLink" style="display:none">Dashboard</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="register.html" id="registerLink">Register</a></li>
                <li><a href="#" id="logoutBtn" style="display:none" onclick="logout()">Logout</a></li>
                <li><a href="organizer-dashboard.html">Organizer Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="events-header">
            <h1>All Campus Events</h1>
            <p>Browse and register for upcoming events</p>
        </div>
        
        <div class="events-grid" id="allEvents">
            <div style="text-align:center; padding:50px;">Loading events from MongoDB...</div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Campus Events Management System. All rights reserved.</p>
        </div>
    </footer>

    <style>
        .events-header {
            text-align: center;
            margin: 40px 0;
        }
        .events-header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .events-header p {
            color: #666;
        }
    </style>

    <script>
        const API_URL = 'http://localhost:5002/api';
        let currentUser = null;
        
        // Check login status
        function checkLogin() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (token && user) {
                currentUser = JSON.parse(user);
                const dashboardLink = document.getElementById('dashboardLink');
                const loginLink = document.getElementById('loginLink');
                const registerLink = document.getElementById('registerLink');
                const logoutBtn = document.getElementById('logoutBtn');
                
                if (dashboardLink) dashboardLink.style.display = 'block';
                if (loginLink) loginLink.style.display = 'none';
                if (registerLink) registerLink.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'block';
                console.log('Logged in as:', currentUser.name);
            } else {
                console.log('Not logged in');
            }
        }
        
        // Load events from MongoDB API
        async function loadEvents() {
            const container = document.getElementById('allEvents');
            if (!container) return;
            
            container.innerHTML = '<div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin"></i> Loading events from MongoDB...</div>';
            
            try {
                console.log('Fetching events from:', `${API_URL}/events`);
                const response = await fetch(`${API_URL}/events`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const events = await response.json();
                console.log('Events received:', events);
                
                if (!events || events.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:50px;">No events found. Check back later!</div>';
                    return;
                }
                
                container.innerHTML = events.map(event => createEventCard(event)).join('');
                console.log('✅ Displayed', events.length, 'events');
                
            } catch (err) {
                console.error('Error loading events:', err);
                container.innerHTML = `
                    <div style="text-align:center; padding:50px; color:red;">
                        <i class="fas fa-exclamation-circle"></i> Error loading events.<br>
                        Make sure backend is running on port 5001.<br>
                        <small>${err.message}</small>
                    </div>
                `;
            }
        }
        
        // Create event card HTML
        function createEventCard(event) {
            const spotsLeft = (event.participantLimit || 0) - (event.currentRegistrations || 0);
            const isFull = spotsLeft <= 0;
            const isLoggedIn = currentUser !== null;
            const isStudent = currentUser?.role === 'student';
            const eventDate = event.date ? new Date(event.date).toLocaleDateString() : 'Date TBA';
            
            const categoryColors = {
                workshop: '#667eea',
                hackathon: '#f39c12',
                cultural: '#e74c3c',
                sports: '#27ae60',
                seminar: '#3498db'
            };
            
            return `
                <div class="event-card">
                    <div class="event-card-header" style="background: linear-gradient(135deg, ${categoryColors[event.category] || '#667eea'} 0%, #764ba2 100%);">
                        <h3><i class="fas fa-calendar-alt"></i> ${event.eventName || 'Untitled Event'}</h3>
                        <span class="event-badge">${(event.category || 'general').toUpperCase()}</span>
                    </div>
                    <div class="event-card-body">
                        <p>${event.description || 'No description available'}</p>
                        <div class="event-info">
                            <p><i class="fas fa-calendar-alt"></i> ${eventDate}</p>
                            <p><i class="fas fa-map-marker-alt"></i> ${event.venue || 'Venue TBA'}</p>
                            <p><i class="fas fa-users"></i> By: ${event.organizerName || 'Organizer'}</p>
                        </div>
                        <div class="event-spots">
                            <span class="${isFull ? 'spots-full' : 'spots-available'}">
                                <i class="fas fa-ticket-alt"></i> ${isFull ? 'Event Full' : `${spotsLeft} spots left`}
                            </span>
                        </div>
                        ${isLoggedIn && isStudent && !isFull ? `
                            <button onclick="registerForEvent('${event._id}')" class="btn btn-primary" style="margin-top:15px; width:100%;">
                                <i class="fas fa-plus-circle"></i> Register Now
                            </button>
                        ` : ''}
                        ${isLoggedIn && isStudent && isFull ? `
                            <button disabled class="btn btn-secondary" style="margin-top:15px; width:100%;">
                                <i class="fas fa-ban"></i> Event Full
                            </button>
                        ` : ''}
                        ${!isLoggedIn ? `
                            <button onclick="window.location.href='login.html'" class="btn btn-primary" style="margin-top:15px; width:100%;">
                                <i class="fas fa-sign-in-alt"></i> Login to Register
                            </button>
                        ` : ''}
                        ${isLoggedIn && !isStudent ? `
                            <button disabled class="btn btn-secondary" style="margin-top:15px; width:100%;">
                                <i class="fas fa-user-graduate"></i> Students Only
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        // Register for event
        async function registerForEvent(eventId) {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                alert('Please login first');
                window.location.href = 'login.html';
                return;
            }
            
            if (!confirm('Are you sure you want to register for this event?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/registrations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({ 
                        eventId: eventId, 
                        studentId: user.id 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('✅ Successfully registered for event!');
                    loadEvents(); // Refresh the page
                } else {
                    alert('❌ ' + (data.message || 'Registration failed'));
                }
            } catch (err) {
                console.error('Registration error:', err);
                alert('Error registering for event. Make sure backend is running.');
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
        
        // Initialize page when loaded
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Events page loaded');
            checkLogin();
            loadEvents();
        });
    </script>
</body>
</html>
