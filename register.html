<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Campus Events</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-calendar-alt"></i> CampusEvents</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html" class="active">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" autocomplete="off" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" autocomplete="off" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" id="rollNumber" autocomplete="off" placeholder="CS2024001 (Optional for organizers)">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department" autocomplete="off">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science (CS)</option>
                        <option value="Information Technology">Information Technology (IT)</option>
                        <option value="Artificial Intelligence & Machine Learning">Artificial Intelligence & Machine Learning (AIML)</option>
                        <option value="Data Science">Data Science (DS)</option>
                        <option value="Computer Science & Business Systems">Computer Science & Business Systems (CSBS)</option>
                        <option value="Electronics & Communication">Electronics & Communication (ECE)</option>
                        <option value="Electrical Engineering">Electrical Engineering (EE)</option>
                        <option value="Mechanical Engineering">Mechanical Engineering (ME)</option>
                        <option value="Civil Engineering">Civil Engineering (CE)</option>
                        <option value="Chemical Engineering">Chemical Engineering (ChE)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" autocomplete="new-password" required placeholder="Create a strong password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" autocomplete="new-password" required placeholder="Confirm your password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" autocomplete="off">
                        <option value="student">Student</option>
                        <option value="organizer">Event Organizer</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>
            <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5002/api';
        
        // Clear form fields on page load
        window.addEventListener('load', function() {
            document.getElementById('registerForm').reset();
            // Also clear any browser autofilled values
            setTimeout(() => {
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('rollNumber').value = '';
                document.getElementById('password').value = '';
                document.getElementById('confirmPassword').value = '';
            }, 100);
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const rollNumber = document.getElementById('rollNumber').value;
            const department = document.getElementById('department').value;
            const role = document.getElementById('role').value;
            
            if (!name || !email || !password) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }
            
            if (password.length < 4) {
                showMessage('Password must be at least 4 characters', 'error');
                return;
            }
            
            const userData = {
                name: name,
                email: email,
                password: password,
                role: role,
                rollNumber: rollNumber,
                department: department
            };
            
            console.log('Sending registration:', userData.email);
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage('Registration successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Registration failed', 'error');
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Server error. Please make sure backend is running on port 5002', 'error');
            }
        });
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.textContent = '';
                msgDiv.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
